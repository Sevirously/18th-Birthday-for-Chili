<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 18th Birthday 🌸</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="particles"></div>

<main id="scene">

    <section id="garden">

    </section>

    <section id="hero">

        <h1 class="title">
            Happy Birthday
        </h1>

        <p class="subtitle">
            Every flower blooms in its own time...
        </p>

        <button id="openBtn">
            Open Letter
        </button>

    </section>

</main>

<section id="letterSection">

    <div class="envelope">

        <div class="flap"></div>

        <div class="paper">

            <h2>For You 🌸</h2>

            <p id="typewriter"></p>

        </div>

    </div>

</section>

<audio id="bgMusic" loop>
    <source src="assets/music/birthday.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
